services:
  habittracker:
    image: habittracker
    build:
      context: .
      dockerfile: HabitTracker/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ConnectionStrings__Users=Host=postgres;Port=5432;Database=habittracker;Username=postgres;Password=postgres

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_DB=habittracker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d habittracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
